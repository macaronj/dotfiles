
# --------------------keys--------------------
[keys.normal]
c = ["change_selection_noyank"]
d = ["delete_selection_noyank"]
x = ["extend_to_line_bounds", "select_mode"]
X = ["extend_line_below"]
esc = ["collapse_selection", "keep_primary_selection", ":w"]
"{" = ["goto_prev_paragraph"]
"}" = ["goto_next_paragraph"]
"," = "repeat_last_motion"
D = [
  "ensure_selections_forward",
  "extend_to_line_end",
  "delete_selection",
]
";" = "flip_selections"
ret = "@gw"
"n" = ["search_next", "align_view_center"]
"N" = ["search_prev", "align_view_center"]
C-d = ":half-page-down-smooth"
C-u = ":half-page-up-smooth"
"#" = "@miw/<C-r>.<ret>"
"@" = "@miw<space>/<C-r>."
# like in principle - in practice need to fix tabbing each time we insert on new line...
# o = ["open_below", "normal_mode"]
# O = ["open_above", "normal_mode"]
# FIXME: enable smart tabs once enhanced kitty keyboard protocol supported in alacritty
# - https://github.com/alacritty/alacritty/issues/8836
# - https://docs.helix-editor.com/master/editor.html#editorsmart-tab-section
# tab = "move_parent_node_end"
# S-tab = "move_parent_node_start"

[keys.normal.space]
i = ":toggle lsp.display-inlay-hints"
q = [":q"]
Q = [":q!"]
x = [":bc"]
X = [":bc!"]
# yazi
e = [
  ":sh rm -f /tmp/unique-file",
  ":insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file",
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ":open %sh{cat /tmp/unique-file}",
  ":redraw",
]
# lazygit
g = [
  ":write-all",
  ":new",
  ":insert-output lazygit",
  ":buffer-close!",
  ":redraw",
  ":reload-all"
]
# find and replace using scooter
R = [
  ":write-all",
  ":insert-output scooter --no-stdin --interpret-escape-sequences >/dev/tty",
  ":redraw",
  ":reload-all"
]
E = "@ D%sev error"
# daily journal
j = ":open %sh{daily_journal}"

# --------------------config--------------------
[keys.normal.space.","]
"c" = ":config-open"
"l" = ":open ~/.config/helix/languages.toml"
"r" = ":config-reload"

[keys.select]
c = ["change_selection_noyank"]
d = ["delete_selection_noyank"]
esc = ["collapse_selection", "keep_primary_selection", "normal_mode", ":w"]
"{" = ["goto_prev_paragraph"]
"}" = ["goto_next_paragraph"]
"," = "repeat_last_motion"
D = ["extend_to_line_bounds", "delete_selection", "normal_mode"]
"g" = { "e" = "extend_to_file_end" }
";" = "flip_selections"
ret = "@gw"
# FIXME: needed for smart-tab but break Ctrl-i in zellij
# tab = "move_parent_node_end"
# S-tab = "move_parent_node_start"

[keys.insert]
C-a = "insert_at_line_start"
C-e = "insert_at_line_end"
C-b = "move_char_left"
C-f = "move_char_right"
C-c = "signature_help"

# --------------------editor--------------------
[editor]
bufferline = "always"
scrolloff = 30
line-number = "relative"
default-yank-register = "+"
mouse = false
cursorline = true
color-modes = true
completion-trigger-len = 1
shell = ["fish", "-c"]
idle-timeout = 10
completion-timeout = 5
text-width = 80
jump-label-alphabet = "tnseriplfuwydhcxoaqz"
trim-final-newlines = true
trim-trailing-whitespace = true

[editor.statusline]
left = [
  "mode",
  "spinner",
  "version-control",
  # more centered to have it on left currently
  "file-absolute-path",
  "read-only-indicator",
  "file-modification-indicator",
  "diagnostics",
]
# center = [
#   "file-absolute-path"
# ]
right = [
  "workspace-diagnostics",
  "selections",
  "primary-selection-length",
  "position",
  "file-encoding",
]
mode = { normal = "NOR", insert = "INS", select = "SEL" }
separator = "|"

[editor.lsp]
display-progress-messages = true
# blocks code when it pops up
auto-signature-help = false

[editor.cursor-shape]
insert = "bar"
normal = "block"

[editor.file-picker]
hidden = false

[editor.auto-save]
after-delay.enable = true
after-delay.timeout = 0

[editor.whitespace.render]
space = "all"
newline = "all"

[editor.whitespace.characters]
space = "·"
newline = "⏎"

[editor.indent-guides]
render = true
character = "┊"  # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.inline-diagnostics]
cursor-line = "warning"  # show warnings and errors on the cursorline inline

[editor.word-completion]
trigger-length = 2
